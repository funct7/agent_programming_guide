  applies_when:
    constructs:
    - domain-model
    - entity
    - value-object
    - api-response
    - dto
    - pagination
  tags: []
  source: principles.md#domain-modeling
- id: principle.practical-compromise
  tier: principle
  review_passes:
  - substantive
  summary: Make compromises explicit; omit unavailable facts instead of filling idealized
