    - data-mapping
    - parser
    - dto
    - api-response
  tags: []
  source: core-rules.md#domain-facts
- id: core.domain-boundaries
  tier: core-rule
  review_passes:
  - substantive
  summary: Do not turn DTOs, endpoint payloads, or pagination wrappers into Domain;
