  applies_when:
    constructs:
    - domain-model
    - dto
    - endpoint-payload
    - pagination
    - service-mapping
  tags: []
  source: core-rules.md#domain-boundaries
- id: core.state-shape
  tier: core-rule
  review_passes:
  - substantive
  summary: Prefer sum types for invalid product states and avoid duplicated boolean
