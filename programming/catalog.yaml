  applies_when:
    constructs:
    - state
    - enum
    - optional
    - boolean-flag
    - product-type
    - domain-model
    - feature-state
    - derived-value
  tags: []
  source: core-rules.md#state-shape
- id: principle.domain-modeling
  tier: principle
  review_passes:
  - substantive
  summary: Model Domain from the business/resource concept, not one server response,
